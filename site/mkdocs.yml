site_name: ContentForge
site_url: https://mbaneshi.github.io/contentforge/
site_description: A Rust-native content creation and multi-platform publishing platform
site_author: Mehdi Baneshi
repo_url: https://github.com/mbaneshi/contentforge
repo_name: mbaneshi/contentforge
edit_uri: edit/main/site/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Guide:
    - Platform Setup: guide/platforms.md
    - Content Workflow: guide/content-workflow.md
    - AI Agents: guide/ai-agents.md
    - MCP Integration: guide/mcp-integration.md
  - Architecture:
    - Overview: architecture/overview.md
    - Crate Map: architecture/crate-map.md
  - Reference:
    - CLI: reference/cli.md
    - REST API: reference/api.md
    - MCP Tools: reference/mcp.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mbaneshi/contentforge
